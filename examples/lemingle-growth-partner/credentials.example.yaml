# my-agent/credentials/feishu.yaml — 示例
#
# ⚠️ 真实凭据文件应该放在 my-agent/credentials/feishu.yaml
# 那个目录在 .gitignore 里、不会被 commit。
#
# 怎么拿到这些字段：docs/feishu-im-setup.md

bot_app:
  # 在飞书开放平台 → 凭证与基础信息 复制
  app_id: cli_xxxxxxxxxxxxxxxx
  app_secret: REPLACE_WITH_YOUR_SECRET

  # 跑 lark-cli im +chats-list --profile <app-id> 后找 chat_type=p2p 那行复制
  notify_chat_id: oc_REPLACE_WITH_DM_CHAT_ID

# v0.2 会加 user_app（用于 bitable / wiki / drive 操作）。v0.1 只发 IM 用 bot_app。
