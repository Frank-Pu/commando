<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>commando dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
<link rel="stylesheet" href="/styles.css" />
<script defer src="/app.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
</head>
<body>
<div class="scaffold" x-data="dashboard" x-init="init()">

<div x-show="loading" class="empty-state">loading…</div>

<div x-show="error" class="empty-state" style="color: var(--coral-600); border-color: var(--coral-200);">
  <i class="ti ti-alert-triangle" aria-hidden="true"></i>
  <span x-text="error"></span>
</div>

<template x-if="data">
<div>

<header style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 18px;">
  <div class="agent-switcher" @click.outside="agentMenuOpen = false">
    <button class="agent-switcher-trigger" @click="agentMenuOpen = !agentMenuOpen" :aria-label="t('switch_agent')">
      <div style="position:relative;width:40px;height:40px;flex-shrink:0;">
        <img :src="data.agent.avatar_url" :alt="data.agent.name" style="width:40px;height:40px;border-radius:50%;object-fit:cover;display:block;" />
        <span style="position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--teal-400);border:2px solid var(--bg-secondary);"></span>
      </div>
      <div style="min-width:0;">
        <p style="font-size:15px;font-weight:500;margin:0;" x-text="data.agent.name"></p>
        <p style="font-size:12px;color:var(--text-secondary);margin:2px 0 0;">
          <span x-text="data.agent.subtitle"></span>
          <span style="color:var(--text-tertiary);"> · </span>
          <span x-text="t('powered_by')" style="color:var(--text-tertiary);"></span>
        </p>
      </div>
      <i class="ti ti-chevron-down chev" aria-hidden="true" style="font-size:14px;" x-show="agents.length > 1"></i>
    </button>

    <div class="agent-menu" x-show="agentMenuOpen" x-cloak x-transition.opacity>
      <template x-for="a in agents" :key="a.id">
        <button class="agent-menu-item" :class="{ active: a.id === activeAgentId }" @click="switchAgent(a.id)">
          <img :src="a.avatar_url" :alt="a.name" class="agent-menu-avatar" style="object-fit:cover;" />
          <span style="flex:1;min-width:0;">
            <span style="display:block;font-size:13px;font-weight:500;" x-text="a.name"></span>
            <span class="meta" x-text="a.subtitle"></span>
          </span>
          <i class="ti ti-check" aria-hidden="true" style="font-size:14px;" x-show="a.id === activeAgentId"></i>
        </button>
      </template>
      <div class="agent-menu-divider"></div>
      <div class="agent-menu-add">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:13px;"></i>
        <span>commando onboard · 加一个 agent</span>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:6px;">
    <button class="icon-btn" @click="toggleLang()" :title="lang === 'zh' ? 'Switch to English' : '切换为中文'">
      <span x-text="lang === 'zh' ? 'EN' : '中'" style="font-weight:500;font-size:12px;"></span>
    </button>
    <button class="icon-btn" @click="cycleTheme()" :title="theme">
      <i class="ti" :class="themeIcon()" aria-hidden="true" style="font-size:15px;"></i>
    </button>
    <button class="icon-btn" @click="load()" :aria-label="t('refresh')">
      <i class="ti ti-refresh" aria-hidden="true" style="font-size:15px;"></i>
    </button>
    <button class="icon-btn skills-btn" @click="showSkills = true" :aria-label="t('skills')">
      <i class="ti ti-bolt" aria-hidden="true" style="font-size:15px;"></i>
      <span class="skills-btn-count mono" x-text="(data.skills || []).length"></span>
    </button>
    <button class="icon-btn" :aria-label="t('settings')">
      <i class="ti ti-settings" aria-hidden="true" style="font-size:15px;"></i>
    </button>
  </div>
</header>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px;">
  <div class="metric">
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;" x-text="t('awaiting')"></p>
    <p style="font-size:24px;font-weight:500;line-height:1;margin:0;color:var(--coral-600);" x-text="data.metrics.awaiting"></p>
  </div>
  <div class="metric">
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;" x-text="t('running')"></p>
    <p style="font-size:24px;font-weight:500;line-height:1;margin:0;color:var(--amber-600);" x-text="data.metrics.running"></p>
  </div>
  <div class="metric">
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;" x-text="t('done_today')"></p>
    <p style="font-size:24px;font-weight:500;line-height:1;margin:0;color:var(--teal-600);" x-text="data.metrics.done_today"></p>
  </div>
  <div class="metric">
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 4px;" x-text="t('this_week')"></p>
    <p style="font-size:24px;font-weight:500;line-height:1;margin:0;" x-text="data.metrics.this_week"></p>
  </div>
</div>

<nav style="display:flex;gap:4px;margin-bottom:22px;">
  <button class="tab" :class="{'tab-active': activeTab === 'today'}" @click="activeTab='today'">
    <i class="ti ti-list" aria-hidden="true" style="font-size:14px;"></i>
    <span x-text="t('today')"></span>
  </button>
  <button class="tab" :class="{'tab-active': activeTab === 'kanban'}" @click="activeTab='kanban'">
    <i class="ti ti-layout-kanban" aria-hidden="true" style="font-size:14px;"></i>
    <span x-text="t('kanban')"></span>
  </button>
  <button class="tab" :class="{'tab-active': activeTab === 'calendar'}" @click="activeTab='calendar'">
    <i class="ti ti-calendar" aria-hidden="true" style="font-size:14px;"></i>
    <span x-text="t('calendar')"></span>
  </button>
  <button class="tab" :class="{'tab-active': activeTab === 'knowledge'}" @click="activeTab='knowledge'">
    <i class="ti ti-books" aria-hidden="true" style="font-size:14px;"></i>
    <span x-text="t('knowledge')"></span>
  </button>
  <button class="tab" :class="{'tab-active': activeTab === 'activity'}" @click="activeTab='activity'">
    <i class="ti ti-broadcast" aria-hidden="true" style="font-size:14px;"></i>
    <span x-text="t('activity')"></span>
  </button>
</nav>

<section x-show="activeTab === 'today'">

  <p class="sec-label">
    <span x-text="t('today')"></span><span class="meta" x-text="dateLabel(data.today.date)"></span>
  </p>

  <template x-for="task in data.today.tasks" :key="task.id">
    <div class="card" :class="{'card-ask': isAsk(task)}" style="margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <p style="font-size:14px;font-weight:500;margin:0;" x-text="task.task_id"></p>
            <template x-for="s in (task.skills || [])" :key="s">
              <span class="skill" x-text="s"></span>
            </template>
          </div>
          <p style="font-size:12px;margin:0;" :style="isAsk(task) ? 'color: var(--coral-800);' : 'color: var(--text-secondary);'" x-text="task.summary"></p>
          <button x-show="isAsk(task)" class="btn-primary" @click="openArtifact(task)" style="margin-top:10px;">
            <span x-text="t('review_btn')"></span>
            <i class="ti ti-arrow-right" aria-hidden="true" style="font-size:12px;"></i>
          </button>
        </div>
        <span :class="pillClass(task.status)">
          <i class="ti" :class="pillIcon(task.status)" aria-hidden="true" style="font-size:11px;" x-show="pillIcon(task.status)"></i>
          <span x-text="pillLabel(task.status)"></span>
        </span>
      </div>
    </div>
  </template>

  <p class="sec-label" style="margin-top:24px;">
    <span x-text="t('tomorrow')"></span><span class="meta" x-text="dateLabel(data.tomorrow.date)"></span>
  </p>

  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px 14px;margin-bottom:26px;">
    <template x-for="t in data.tomorrow.tasks" :key="t.id">
      <div style="display:flex;align-items:baseline;gap:10px;">
        <span class="mono" style="font-size:12px;color:var(--teal-600);min-width:38px;font-weight:500;" x-text="t.time"></span>
        <span style="font-size:13px;" x-text="t.task_id"></span>
      </div>
    </template>
  </div>

  <p class="sec-label" x-text="t('kanban_preview')"></p>
  <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;">
    <div>
      <p style="font-size:11px;font-weight:500;color:var(--text-secondary);margin:0 0 6px;">
        <span x-text="t('inbox')"></span> · <span x-text="data.kanban.inbox.length"></span>
      </p>
      <div class="col-bucket bucket-inbox">
        <template x-if="data.kanban.inbox[0]">
          <div>
            <p style="font-size:12px;font-weight:500;margin:0 0 4px;line-height:1.4;" x-text="data.kanban.inbox[0].title"></p>
            <p style="font-size:11px;color:var(--text-tertiary);margin:0;" x-text="data.kanban.inbox[0].meta"></p>
          </div>
        </template>
      </div>
    </div>
    <div>
      <p style="font-size:11px;font-weight:500;color:var(--amber-800);margin:0 0 6px;">
        <span x-text="t('wip')"></span> · <span x-text="data.kanban.wip.length"></span>
      </p>
      <div class="col-bucket bucket-wip">
        <template x-if="data.kanban.wip[0]">
          <div>
            <p style="font-size:12px;font-weight:500;margin:0 0 4px;line-height:1.4;color:var(--amber-800);" x-text="data.kanban.wip[0].title"></p>
            <p style="font-size:11px;color:var(--amber-800);margin:0;opacity:0.8;" x-text="data.kanban.wip[0].meta"></p>
          </div>
        </template>
      </div>
    </div>
    <div>
      <p style="font-size:11px;font-weight:500;color:var(--coral-800);margin:0 0 6px;">
        <span x-text="t('review_col')"></span> · <span x-text="data.kanban.review.length"></span>
      </p>
      <div class="col-bucket bucket-review">
        <template x-if="data.kanban.review[0]">
          <div>
            <p style="font-size:12px;font-weight:500;margin:0 0 4px;line-height:1.4;color:var(--coral-800);" x-text="data.kanban.review[0].title"></p>
            <p style="font-size:11px;color:var(--coral-800);margin:0;opacity:0.8;" x-text="data.kanban.review[0].meta"></p>
          </div>
        </template>
      </div>
    </div>
    <div>
      <p style="font-size:11px;font-weight:500;color:var(--teal-800);margin:0 0 6px;">
        <span x-text="t('done_col')"></span> · <span x-text="data.kanban.done.length"></span>
      </p>
      <div class="col-bucket bucket-done">
        <template x-if="data.kanban.done[0]">
          <div>
            <p style="font-size:12px;font-weight:500;margin:0 0 4px;line-height:1.4;color:var(--teal-800);" x-text="data.kanban.done[0].title"></p>
            <p style="font-size:11px;color:var(--teal-800);margin:0;opacity:0.8;" x-text="data.kanban.done[0].meta"></p>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>

<section x-show="activeTab === 'kanban'">
  <p class="sec-label">
    <span x-text="t('kanban')"></span><span class="meta" x-text="t('kanban_subtitle')"></span>
  </p>
  <div class="kanban-full">
    <div class="kanban-col">
      <div class="kanban-head"><span x-text="t('inbox')"></span><span class="mono" x-text="data.kanban.inbox.length"></span></div>
      <template x-for="card in data.kanban.inbox" :key="card.title">
        <div class="kanban-card" :data-bucket="'inbox'">
          <p class="title" x-text="card.title"></p>
          <p class="meta" x-text="card.meta"></p>
          <template x-if="card.skill">
            <span class="skill" x-text="card.skill"></span>
          </template>
        </div>
      </template>
    </div>
    <div class="kanban-col">
      <div class="kanban-head" style="color:var(--amber-800);"><span x-text="t('wip')"></span><span class="mono" x-text="data.kanban.wip.length"></span></div>
      <template x-for="card in data.kanban.wip" :key="card.title">
        <div class="kanban-card kanban-card-wip">
          <p class="title" x-text="card.title"></p>
          <p class="meta" x-text="card.meta"></p>
          <template x-if="card.skill">
            <span class="skill" x-text="card.skill"></span>
          </template>
        </div>
      </template>
    </div>
    <div class="kanban-col">
      <div class="kanban-head" style="color:var(--coral-800);"><span x-text="t('review_col')"></span><span class="mono" x-text="data.kanban.review.length"></span></div>
      <template x-for="card in data.kanban.review" :key="card.title">
        <div class="kanban-card kanban-card-review">
          <p class="title" x-text="card.title"></p>
          <p class="meta" x-text="card.meta"></p>
          <template x-if="card.actionable">
            <button class="btn-primary" style="margin-top:8px;font-size:12px;padding:5px 10px;" @click="card.artifact_uri && openArtifact(card)">
              <span x-text="t('review_btn')"></span>
              <i class="ti ti-arrow-right" aria-hidden="true" style="font-size:11px;"></i>
            </button>
          </template>
        </div>
      </template>
    </div>
    <div class="kanban-col">
      <div class="kanban-head" style="color:var(--teal-800);"><span x-text="t('done_col')"></span><span class="mono" x-text="data.kanban.done.length"></span></div>
      <template x-for="card in data.kanban.done" :key="card.title">
        <div class="kanban-card kanban-card-done">
          <p class="title" x-text="card.title"></p>
          <p class="meta" x-text="card.meta"></p>
          <template x-if="card.skill">
            <span class="skill" x-text="card.skill"></span>
          </template>
        </div>
      </template>
    </div>
  </div>
</section>

<section x-show="activeTab === 'calendar'">
  <div class="cal-toolbar">
    <p class="sec-label" style="margin:0;">
      <span x-text="t('calendar')"></span><span class="meta" x-text="calendarView === 'week' ? (data.week ? data.week.label : '') : monthLabel()"></span>
    </p>
    <div class="cal-toggle">
      <button :class="{ active: calendarView === 'week' }" @click="calendarView='week'" x-text="t('view_week')"></button>
      <button :class="{ active: calendarView === 'month' }" @click="calendarView='month'" x-text="t('view_month')"></button>
    </div>
  </div>

  <div x-show="calendarView === 'week'">
    <div class="week-grid">
      <template x-for="day in (data.week ? data.week.days : [])" :key="day.date">
        <div class="day-col" :class="{ 'day-today': day.is_today }">
          <div class="day-head">
            <span class="weekday" x-text="weekdayLong(day.weekday)"></span>
            <span class="dom mono" x-text="day.dom"></span>
          </div>
          <template x-if="day.tasks.length === 0">
            <p class="day-empty">—</p>
          </template>
          <template x-for="task in day.tasks" :key="task.task_id + task.time">
            <div class="day-task">
              <span class="mono time" x-text="task.time"></span>
              <span class="tid" x-text="task.task_id"></span>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <div x-show="calendarView === 'month'">
    <div class="month-grid">
      <div class="month-head-row">
        <template x-for="(label, i) in weekdayHeaders()" :key="i">
          <div class="month-head-cell" x-text="label"></div>
        </template>
      </div>
      <template x-for="(wk, wi) in (data.month ? data.month.weeks : [])" :key="wi">
        <div class="month-week-row">
          <template x-for="day in wk.days" :key="day.date">
            <div class="month-cell" :class="{ 'is-today': day.is_today, 'out-of-month': !day.in_month }">
              <p class="month-dom" x-text="day.dom"></p>
              <template x-for="task in day.tasks.slice(0, 2)" :key="task.task_id + task.time">
                <div class="month-task">
                  <span class="time" x-text="task.time"></span>
                  <span class="tid" x-text="task.task_id"></span>
                </div>
              </template>
              <template x-if="day.tasks.length > 2">
                <p class="month-more" x-text="moreLabel(day.tasks.length - 2)"></p>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <p style="font-size:11px;color:var(--text-tertiary);margin:14px 0 0;font-style:italic;" x-text="t('calendar_note')"></p>
</section>

<section x-show="activeTab === 'activity'">
  <div class="act-head">
    <p class="sec-label" style="margin:0;">
      <span x-text="t('activity')"></span><span class="meta" x-text="t('activity_subtitle')"></span>
    </p>
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="act-pulse">
        <span class="act-pulse-dot" :style="livePaused ? 'background:var(--text-tertiary);' : ''"></span>
        <span x-text="livePaused ? t('pause') : t('live')"></span>
        <span style="color:var(--text-tertiary);" x-text="'· ' + t('events_today').replace('{n}', eventsTodayCount())"></span>
      </span>
      <span class="act-now" x-text="nowClock"></span>
      <button class="icon-btn" @click="toggleLive()" style="font-size:12px;padding:4px 10px;">
        <i class="ti" :class="livePaused ? 'ti-player-play' : 'ti-player-pause'" aria-hidden="true" style="font-size:13px;"></i>
        <span x-text="livePaused ? t('resume') : t('pause')"></span>
      </button>
    </div>
  </div>

  <div class="act-feed">
    <template x-for="ev in allEvents()" :key="ev._id || (ev.ts + (ev.task_id || '') + ev.message)">
      <div class="act-row" :class="{ 'is-fresh': ev._fresh }">
        <span class="ts" x-text="formatTs(ev.ts)"></span>
        <span :class="lvlClass(ev.level)" x-text="lvlLabel(ev.level)"></span>
        <span class="msg">
          <template x-if="ev.skill">
            <span class="skill" x-text="ev.skill"></span>
          </template>
          <span x-text="ev.message"></span>
          <template x-if="wouldPushToIM(ev)">
            <span class="act-im-tag" title="event-routing.yaml 会把这条推到飞书 IM">
              <i class="ti ti-send" aria-hidden="true" style="font-size:9px;"></i>IM
            </span>
          </template>
        </span>
        <span class="dur" x-text="formatDuration(ev.duration_ms)"></span>
      </div>
    </template>
  </div>

  <p style="font-size:11px;color:var(--text-tertiary);margin:14px 0 0;font-style:italic;">
    每 9 秒自动追加一条新 event（v0.1 mock 模拟器）· runtime 接通后改成真实 Episodic Memory · 标有
    <span class="act-im-tag" style="font-size:9px;padding:0 4px;"><i class="ti ti-send" aria-hidden="true" style="font-size:8px;"></i>IM</span>
    的 event 由 <span class="mono" style="color:var(--text-secondary);">event-routing.yaml</span> 决定推送到飞书（v0.2 启用）
  </p>
</section>

<section x-show="activeTab === 'knowledge'">
  <p class="sec-label">
    <span x-text="t('knowledge')"></span><span class="meta" x-text="t('knowledge_subtitle')"></span>
  </p>
  <div class="knowledge-grid">
    <template x-for="cat in (data.knowledge || [])" :key="cat.id">
      <div class="k-card">
        <div class="k-card-head">
          <div style="min-width:0;">
            <p class="k-card-name">
              <span class="icon"><i class="ti" :class="cat.icon" aria-hidden="true" style="font-size:14px;"></i></span>
              <span x-text="knowledgeCategoryName(cat)"></span>
              <span class="mono" style="color:var(--text-tertiary);font-weight:400;font-size:12px;" x-text="itemsTotalLabel(cat.count)"></span>
            </p>
            <p class="k-card-meta" x-text="cat.backend"></p>
          </div>
          <button class="k-card-open" @click="cat.backend_url && openLink(cat.backend_url)">
            <span x-text="t('open_all')"></span>
            <i class="ti ti-external-link" aria-hidden="true" style="font-size:11px;"></i>
          </button>
        </div>
        <div>
          <template x-for="it in cat.items" :key="it.title">
            <a class="k-item" :href="it.url" target="_blank" rel="noopener" style="text-decoration:none;cursor:pointer;">
              <p class="title" x-text="it.title"></p>
              <span class="updated" x-text="knowledgeItemUpdated(it)"></span>
            </a>
          </template>
        </div>
      </div>
    </template>
  </div>
  <p style="font-size:11px;color:var(--text-tertiary);margin:18px 0 0;font-style:italic;">
    📚 这是 <span x-text="data.agent.name"></span> 在飞书 / Notion / 本地 semantic memory 里的产物——点开看真实内容。切换 agent 顶部头像。
  </p>
</section>

<div class="footer">
  <p class="mono" style="margin:0;">./my-agent/</p>
  <p class="mono" style="margin:0;">
    <span x-text="t('read_from')"></span> schedule.yaml + skills/
  </p>
</div>

<div class="modal-backdrop" x-show="showSkills" @click="showSkills = false" x-cloak></div>
<div class="modal" x-show="showSkills" x-cloak>
  <div class="modal-card" @click.stop>
    <div class="modal-head">
      <p class="modal-title"><i class="ti ti-bolt" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px;"></i><span x-text="t('skills')"></span> <span class="mono" style="color:var(--text-tertiary);font-weight:400;" x-text="'· ' + (data.skills || []).length"></span></p>
      <button class="icon-btn" @click="showSkills = false" :aria-label="t('close')">
        <i class="ti ti-x" aria-hidden="true" style="font-size:15px;"></i>
      </button>
    </div>
    <div class="modal-body">
      <template x-if="(data.skills || []).length === 0">
        <p style="font-size:12px;color:var(--text-tertiary);margin:0;" x-text="t('no_skills')"></p>
      </template>

      <template x-if="skillsGrouped().actives.length">
        <div>
          <p class="skills-group" x-text="t('skills_active')"></p>
          <template x-for="s in skillsGrouped().actives" :key="s.id">
            <div class="skill-row">
              <p class="name">
                <span x-text="s.id"></span>
                <span :class="skillTagClass(s)" x-text="skillTagLabel(s)"></span>
                <template x-if="s.requires_human_approval">
                  <span class="skill-tag skill-tag-approval" x-text="t('skill_tag_approval')"></span>
                </template>
              </p>
              <p class="desc" x-text="s.description"></p>
            </div>
          </template>
        </div>
      </template>

      <template x-if="skillsGrouped().imported.length">
        <div>
          <p class="skills-group" x-text="t('skills_imported')"></p>
          <template x-for="s in skillsGrouped().imported" :key="s.id">
            <div class="skill-row">
              <p class="name">
                <span x-text="s.id"></span>
                <span :class="skillTagClass(s)" x-text="skillTagLabel(s)"></span>
                <template x-if="s.requires_human_approval">
                  <span class="skill-tag skill-tag-approval" x-text="t('skill_tag_approval')"></span>
                </template>
              </p>
              <p class="desc" x-text="s.description"></p>
            </div>
          </template>
        </div>
      </template>

      <template x-if="skillsGrouped().drafts.length">
        <div>
          <p class="skills-group" x-text="t('skills_draft')"></p>
          <template x-for="s in skillsGrouped().drafts" :key="s.id">
            <div class="skill-row">
              <p class="name">
                <span x-text="s.id"></span>
                <span :class="skillTagClass(s)" x-text="skillTagLabel(s)"></span>
                <template x-if="s.requires_human_approval">
                  <span class="skill-tag skill-tag-approval" x-text="t('skill_tag_approval')"></span>
                </template>
              </p>
              <p class="desc" x-text="s.description"></p>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</div>

</div>
</template>

</div>
</body>
</html>
