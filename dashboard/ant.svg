<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="commando worker ant">
  <title>commando</title>
  <!-- antennae -->
  <path d="M 38 32 Q 30 18 28 8" stroke="#0d3e3e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 48 28 Q 50 14 56 4" stroke="#0d3e3e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="28" cy="8" r="2.5" fill="#0d3e3e"/>
  <circle cx="56" cy="4" r="2.5" fill="#0d3e3e"/>

  <!-- 6 legs -->
  <g stroke="#0d3e3e" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 45 65 L 28 78"/>
    <path d="M 55 70 L 50 92"/>
    <path d="M 70 72 L 75 92"/>
    <path d="M 80 68 L 100 78"/>
    <path d="M 65 58 L 95 50"/>
    <path d="M 50 60 L 30 50"/>
  </g>

  <!-- body: head -->
  <circle cx="40" cy="45" r="16" fill="#2a8585"/>
  <!-- body: thorax -->
  <circle cx="65" cy="55" r="13" fill="#1f6b6b"/>
  <!-- body: abdomen (bigger) -->
  <circle cx="92" cy="63" r="20" fill="#2a8585"/>

  <!-- eyes -->
  <circle cx="33" cy="42" r="3.5" fill="#fff"/>
  <circle cx="33" cy="42" r="1.8" fill="#0d3e3e"/>
  <circle cx="31.8" cy="40.7" r="0.8" fill="#fff"/>

  <!-- configuration block carried on thorax — coral, with three lines of "config" -->
  <g transform="translate(57 32) rotate(-12)">
    <rect width="20" height="18" rx="3" fill="#ff6b6b"/>
    <line x1="3" y1="6"  x2="17" y2="6"  stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="3" y1="10" x2="14" y2="10" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="3" y1="14" x2="15" y2="14" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
